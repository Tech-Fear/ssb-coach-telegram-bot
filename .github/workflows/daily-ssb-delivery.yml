name: Daily SSB Delivery

on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call daily endpoint
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_BASE_URL }}/api/cron/daily"
